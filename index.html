<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Social Climber">
    <link rel="manifest" href="manifest.json">
    <title>🧗 Social Climber</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial; width: 100%; height: 100vh; overflow: hidden; background: #000; }
        canvas { display: block; width: 100%; height: 100%; }
        #menu { position: absolute; width: 100%; height: 100%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; padding: 20px; z-index: 10; }
        #menu h1 { font-size: 48px; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        #menu p { font-size: 16px; margin-bottom: 30px; opacity: 0.9; }
        .avatar-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; max-width: 350px; width: 100%; }
        .avatar-btn { padding: 15px; font-size: 16px; border: 3px solid white; border-radius: 12px; color: white; cursor: pointer; font-weight: bold; background: rgba(255,255,255,0.2); transition: transform 0.2s; }
        .avatar-btn:active { transform: scale(0.95); }
        #hud { position: absolute; top: 20px; left: 20px; color: white; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); z-index: 5; }
        #back-btn { position: absolute; top: 20px; right: 20px; padding: 12px 20px; font-size: 16px; background: rgba(255,107,107,0.8); border: 2px solid white; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; z-index: 5; display: none; }
    </style>
</head>
<body>
    <div id="menu">
        <h1>🧗 Social Climber</h1>
        <p>Pick your avatar and climb!</p>
        <div class="avatar-grid">
            <button class="avatar-btn" onclick="startGame('monkey')">🐵 Monkey</button>
            <button class="avatar-btn" onclick="startGame('cat')">🐱 Cat</button>
            <button class="avatar-btn" onclick="startGame('dog')">🐶 Dog</button>
            <button class="avatar-btn" onclick="startGame('cheetah')">🐆 Cheetah</button>
        </div>
        <p style="font-size: 14px; opacity: 0.8;">👆 Tap and hold to climb faster!</p>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div id="hud">
        <div>💰 Score: <span id="score">0</span></div>
        <div style="margin-top: 10px; font-size: 18px;">
            📈 Height: <span id="height">0</span>m<br>
            🏆 Max: <span id="maxHeight">0</span>m
        </div>
    </div>
    <button id="back-btn" onclick="goBack()">Back</button>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW:', err));
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const menu = document.getElementById('menu');
        const hud = document.getElementById('hud');
        const backBtn = document.getElementById('back-btn');
        const scoreEl = document.getElementById('score');
        const heightEl = document.getElementById('height');
        const maxHeightEl = document.getElementById('maxHeight');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameStarted = false;
        let score = 0;
        let currentHeight = 0;
        let maxHeight = 0;
        let isClimbing = false;
        let avatarY = 0;
        let avatarVelocity = 0;

        const avatars = {
            monkey: { color: '#d4a574', speed: 0.12, name: '🐵' },
            cat: { color: '#ffa500', speed: 0.08, name: '🐱' },
            dog: { color: '#8b4513', speed: 0.10, name: '🐶' },
            cheetah: { color: '#ffcc00', speed: 0.16, name: '🐆' }
        };

        let currentAvatar = null;
        let coins = [];
        let particles = [];

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        let draggedCoin = null;

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            let x, y;
            if (e.touches) {
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }
            return { x: x * (canvas.width / rect.width), y: y * (canvas.height / rect.height) };
        }

        function checkCoinClick(x, y) {
            for (let coin of coins) {
                if (coin.collected) continue;
                const dist = Math.sqrt(Math.pow(x - coin.x, 2) + Math.pow(y - coin.y, 2));
                if (dist < 40) return coin;
            }
            return null;
        }

        canvas.addEventListener('mousedown', (e) => {
            const coords = getCoords(e);
            draggedCoin = checkCoinClick(coords.x, coords.y);
            if (draggedCoin) {
                if (draggedCoin.type === 'danger') {
                    score = Math.max(0, score - 10);
                    draggedCoin.collected = true;
                    draggedCoin = null;
                    // Spawn danger particles
                    for (let i = 0; i < 5; i++) {
                        particles.push({
                            x: draggedCoin.x,
                            y: draggedCoin.y,
                            vx: (Math.random() - 0.5) * 6,
                            vy: (Math.random() - 0.5) * 6,
                            life: 20
                        });
                    }
                }
            } else {
                isClimbing = true;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!draggedCoin) return;
            const coords = getCoords(e);
            draggedCoin.x = coords.x;
            draggedCoin.y = coords.y;
        });

        canvas.addEventListener('mouseup', () => { 
            draggedCoin = null;
            isClimbing = false; 
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const coords = getCoords(e);
            draggedCoin = checkCoinClick(coords.x, coords.y);
            if (draggedCoin) {
                if (draggedCoin.type === 'danger') {
                    score = Math.max(0, score - 10);
                    draggedCoin.collected = true;
                    draggedCoin = null;
                }
            } else {
                isClimbing = true;
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!draggedCoin) return;
            const coords = getCoords(e);
            draggedCoin.x = coords.x;
            draggedCoin.y = coords.y;
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            draggedCoin = null;
            isClimbing = false;
        });

        function startGame(avatar) {
            gameStarted = true;
            currentAvatar = avatar;
            menu.style.display = 'none';
            hud.style.display = 'block';
            backBtn.style.display = 'block';
            score = 0;
            currentHeight = 0;
            maxHeight = 0;
            avatarY = canvas.height / 2;
            avatarVelocity = 0;
            coins = spawnCoins();
            animate();
        }

        function goBack() {
            gameStarted = false;
            menu.style.display = 'flex';
            hud.style.display = 'none';
            backBtn.style.display = 'none';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function spawnCoins() {
            const newCoins = [];
            for (let i = 0; i < 12; i++) {
                const type = Math.random() > 0.6 ? 'danger' : 'gold';
                newCoins.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: Math.random() * (canvas.height - 100) + 50,
                    radius: 12,
                    collected: false,
                    spin: 0,
                    type: type,
                    color: type === 'danger' ? '#4ecdc4' : '#ffdd00'
                });
            }
            return newCoins;
        }

        function drawWall() {
            ctx.fillStyle = '#8b7355';
            ctx.fillRect(50, 0, canvas.width - 100, canvas.height);
            
            // Footholds
            for (let i = 0; i < 20; i++) {
                const x = 100 + Math.sin(i) * 100;
                const y = i * (canvas.height / 20);
                ctx.fillStyle = i % 2 === 0 ? '#ff6b6b' : '#4ecdc4';
                ctx.beginPath();
                ctx.arc(x, y, 15, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawAvatar(x, y) {
            if (!currentAvatar) return;
            const avatar = avatars[currentAvatar];
            
            // Body
            ctx.fillStyle = avatar.color;
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2);
            ctx.fill();
            
            // Eyes
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x - 6, y - 5, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 6, y - 5, 5, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawCoins() {
            coins.forEach(coin => {
                if (coin.collected) return;
                
                coin.spin += 0.1;
                ctx.save();
                ctx.translate(coin.x, coin.y);
                ctx.rotate(coin.spin);
                ctx.fillStyle = coin.color;
                ctx.beginPath();
                ctx.arc(0, 0, coin.radius, 0, Math.PI * 2);
                ctx.fill();
                
                if (coin.type === 'danger') {
                    ctx.strokeStyle = '#ff0000';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 10px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('!', 0, 0);
                } else {
                    ctx.strokeStyle = '#ffa500';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
                ctx.restore();
            });
        }

        function drawParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                
                ctx.fillStyle = `rgba(255, 221, 0, ${p.life / 30})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                ctx.fill();
                
                return p.life > 0;
            });
        }

        function checkCoinCollision() {
            const avatarX = canvas.width / 2;
            coins.forEach(coin => {
                if (coin.collected) return;
                const dist = Math.sqrt(Math.pow(avatarX - coin.x, 2) + Math.pow(avatarY - coin.y, 2));
                if (dist < 40) {
                    coin.collected = true;
                    score += 10;
                    
                    // Particles
                    for (let i = 0; i < 8; i++) {
                        particles.push({
                            x: coin.x,
                            y: coin.y,
                            vx: (Math.random() - 0.5) * 4,
                            vy: (Math.random() - 0.5) * 4,
                            life: 30
                        });
                    }
                }
            });
        }

        function animate() {
            if (!gameStarted) return;

            // Clear
            ctx.fillStyle = '#87ceeb';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw wall
            drawWall();

            // Climbing physics
            const accel = isClimbing ? 0.18 : 0.10;
            avatarVelocity = Math.min(avatarVelocity + accel, avatars[currentAvatar].speed);
            avatarY -= avatarVelocity;

            // Update height
            currentHeight = Math.max(0, Math.floor((canvas.height / 2 - avatarY) / 10));
            if (currentHeight > maxHeight) maxHeight = currentHeight;

            // Check if reached top
            if (avatarY < 50) {
                score += 50;
                avatarY = canvas.height / 2;
                avatarVelocity = 0;
                coins = spawnCoins();
            }

            // Check if fell off bottom
            if (avatarY > canvas.height) {
                avatarY = canvas.height / 2;
                avatarVelocity = 0;
            }

            // Draw avatar
            drawAvatar(canvas.width / 2, avatarY);

            // Coins & particles
            drawCoins();
            checkCoinCollision();
            drawParticles();

            // Update HUD
            scoreEl.textContent = score;
            heightEl.textContent = currentHeight;
            maxHeightEl.textContent = maxHeight;

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
